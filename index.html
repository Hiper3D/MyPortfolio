    <style>
        /* --- THEME CONFIGURATION --- */
        :root {
            --bg-dark: #0d1117;       /* GitHub Dark Dimmed Background */
            --sidebar-bg: #161b22;    /* Sidebar Background */
            --border-color: #30363d;  /* Subtle Borders */
            --text-main: #c9d1d9;     /* Main Text */
            --text-muted: #8b949e;    /* Muted Text */
            --accent-blue: #58a6ff;   /* Links */
            --accent-green: #238636;  /* Buttons */
            --accent-orange: #f78166; /* File Icons */
            --code-font: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--code-font);
            display: flex;
            height: 100vh;
            height: 100dvh; /* Fix for mobile browsers */
            overflow: hidden; 
        }

        /* --- MOBILE HEADER --- */
        .mobile-header {
            display: none;
            background-color: var(--sidebar-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 20px;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 100;
            align-items: center;
            justify-content: space-between;
        }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 24px;
            cursor: pointer;
        }

        .brand-name {
            font-weight: bold;
            color: var(--text-main);
            letter-spacing: -1px;
            font-size: 1.1rem; /* Slightly larger for name */
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            z-index: 90;
        }

        .sidebar-header {
            padding: 15px 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
        }

        .file-list {
            list-style: none;
            padding-top: 10px;
        }

        /* FOLDER HEADER STYLING */
        .folder-header {
            padding: 8px 15px;
            color: var(--text-muted);
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .folder-header:hover {
            color: var(--text-main);
        }

        .folder-arrow {
            width: 12px;
            display: inline-block;
            text-align: center;
            font-size: 0.7rem;
            transition: transform 0.2s;
        }

        /* FILE ITEMS - FIXED LAYOUT & TRUNCATION */
        .file-item {
            padding: 8px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-left: 3px solid transparent;
            transition: background 0.2s;
            overflow: hidden; /* Essential for ellipsis */
        }

        /* Indent project files */
        .file-item.nested {
            padding-left: 35px; 
        }

        .file-item:hover {
            background-color: #21262d;
            color: var(--text-main);
        }

        .file-item.active {
            background-color: #21262d;
            border-left-color: var(--accent-orange);
            color: var(--text-main);
        }

        .file-icon {
            flex-shrink: 0;
            width: 20px;
            text-align: center;
            margin-right: 8px;
        }

        /* Force truncation for long filenames */
        .file-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        /* --- MAIN CONTENT LAYOUT --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: var(--bg-dark);
            height: 100%;
            overflow: hidden; 
        }

        /* FIXED: Tight Breadcrumb Spacing */
        .breadcrumb {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.85rem;
            background-color: var(--bg-dark);
            display: flex;
            align-items: center;
            flex-shrink: 0; 
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none; 
        }
        
        /* The separator slash style */
        .bread-sep {
            margin: 0 4px; /* TIGHT SPACING (4px) */
            opacity: 0.5;
            font-size: 0.9em;
        }
        
        .breadcrumb::-webkit-scrollbar { display: none; }

        /* SCROLL WRAPPER */
        .scroll-wrapper {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .content-viewer {
            padding: 40px;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            flex: 1 0 auto; 
        }

        /* TYPOGRAPHY */
        .content-viewer h1 { font-size: 2rem; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .content-viewer h2 { font-size: 1.4rem; color: var(--accent-blue); margin-top: 35px; margin-bottom: 15px; }
        .content-viewer h3 { font-size: 1.1rem; color: var(--text-main); margin-top: 20px; margin-bottom: 10px; }
        .content-viewer p { margin-bottom: 15px; color: var(--text-main); }
        .content-viewer ul { margin-left: 20px; margin-bottom: 20px; color: var(--text-muted); }
        .content-viewer li { margin-bottom: 8px; }

        /* SKILL BADGES - MOBILE OPTIMIZED */
        .badge-container { 
            display: flex; 
            gap: 12px; 
            flex-wrap: wrap; 
            margin-bottom: 20px;
            align-items: center;
        }
        
        .badge {
            background: #21262d;
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            flex-grow: 0;
        }

        /* PROFILE HEADER */
        .profile-section {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 40px;
            padding: 20px;
            background: #161b22;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--border-color);
            object-fit: cover;
            object-position: top;
            background-color: #0d1117;
        }

        /* CODE BLOCKS */
        .code-block {
            background-color: #0d1117;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            overflow-x: auto;
            margin-top: 15px;
            font-size: 0.9rem;
            position: relative;
        }
        
        .code-block::before {
            content: "CODE";
            position: absolute;
            top: 0;
            right: 0;
            background: var(--border-color);
            color: var(--text-muted);
            font-size: 0.7rem;
            padding: 2px 8px;
            border-bottom-left-radius: 6px;
        }

        .keyword { color: #ff7b72; }
        .string { color: #a5d6ff; }
        .function { color: #d2a8ff; }
        .number { color: #79c0ff; }

        /* DOWNLOAD BUTTON */
        .btn {
            display: inline-block;
            background-color: var(--accent-green);
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: opacity 0.2s;
            margin-top: 10px;
        }
        .btn:hover { opacity: 0.9; }

        /* FOOTER */
        .footer {
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-dark);
            padding: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            flex-shrink: 0;
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        
        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer a { 
            color: var(--accent-blue); 
            text-decoration: none; 
            font-weight: bold;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            body { flex-direction: column; padding-top: 60px; }
            .mobile-header { display: flex; }
            .sidebar {
                position: fixed; top: 60px; left: 0; bottom: 0;
                width: 85%; max-width: 320px;
                transform: translateX(-100%);
                box-shadow: 10px 0 30px rgba(0,0,0,0.5);
                z-index: 1000;
            }
            .sidebar.open { transform: translateX(0); }
            .profile-section { flex-direction: column; text-align: center; }
            .content-viewer { padding: 20px; } 
            
            .badge-container {
                gap: 8px;
            }
            .badge {
                font-size: 0.8rem;
                padding: 6px 10px;
            }
        }
    </style>
</head>

        const viewerEl = document.getElementById('viewer');
        const breadcrumbEl = document.getElementById('breadcrumbBar');
        const sidebarEl = document.getElementById('sidebar');

        let isProjectsOpen = false; 
        let activeFileId = 'readme'; 

        function toggleProjects(e) {
            if (e) {
                e.stopPropagation();
            }
            isProjectsOpen = !isProjectsOpen;
            renderSidebar();
        }

        function renderSidebar() {
            fileListEl.innerHTML = '';
            
            // 1. Render Top Files (Readme & Resume)
            topFiles.forEach(file => {
                const li = document.createElement('li');
                li.className = 'file-item';
                if (file.id === activeFileId) li.classList.add('active');
                
                // FIXED: Wrapped name for truncation
                li.innerHTML = `
                    <span class="file-icon" style="color: ${file.color}">
                        <i class="${file.icon}"></i>
                    </span> 
                    <span class="file-name">${file.name}</span>
                `;
                li.onclick = () => loadFile(file);
                fileListEl.appendChild(li);
            });

            // 2. Render Project Folder Header
            const folderHeader = document.createElement('li');
            folderHeader.className = 'folder-header';
            
            const arrowIcon = isProjectsOpen ? 'fa-chevron-down' : 'fa-chevron-right';
            const folderIcon = isProjectsOpen ? 'fa-folder-open' : 'fa-folder';
            
            folderHeader.innerHTML = `
                <span class="folder-arrow"><i class="fa-solid ${arrowIcon}"></i></span>
                <i class="fa-solid ${folderIcon}" style="color: #8b949e;"></i> 
                projects
            `;
            folderHeader.onclick = toggleProjects;
            fileListEl.appendChild(folderHeader);

            // 3. Render Project Files (Conditional)
            if (isProjectsOpen) {
                projectFiles.forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'file-item nested';
                    if (file.id === activeFileId) li.classList.add('active');
                    
                    // FIXED: Wrapped name for truncation
                    li.innerHTML = `
                        <span class="file-icon" style="color: ${file.color}">
                            <i class="${file.icon}"></i>
                        </span> 
                        <span class="file-name">${file.name}</span>
                    `;
                    li.onclick = () => loadFile(file);
                    fileListEl.appendChild(li);
                });
            }

            // 4. Render Contact File (Last)
            const li = document.createElement('li');
            li.className = 'file-item';
            if (contactFile.id === activeFileId) li.classList.add('active');
            
            li.innerHTML = `
                <span class="file-icon" style="color: ${contactFile.color}">
                    <i class="${contactFile.icon}"></i>
                </span> 
                <span class="file-name">${contactFile.name}</span>
            `;
            li.onclick = () => loadFile(contactFile);
            fileListEl.appendChild(li);
        }

        function loadFile(file) {
            activeFileId = file.id;
            viewerEl.innerHTML = file.content;
            
            // Check if file is in projects to update breadcrumb
            const isProject = projectFiles.find(f => f.id === file.id);
            
            // FIX: Tightened spacing
            if(isProject) {
                breadcrumbEl.innerHTML = `portfolio <span class="bread-sep">/</span> projects <span class="bread-sep">/</span> ${file.name}`;
            } else {
                breadcrumbEl.innerHTML = `portfolio <span class="bread-sep">/</span> ${file.name}`;
            }
            
            renderSidebar();
            
            if (window.innerWidth <= 768) {
                sidebarEl.classList.remove('open');
            }
        }

        window.toggleSidebar = function() {
            sidebarEl.classList.toggle('open');
        }

        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && 
                !sidebarEl.contains(e.target) && 
                !e.target.closest('.menu-btn') &&
                sidebarEl.classList.contains('open')) {
                sidebarEl.classList.remove('open');
            }
        });

        renderSidebar();
        loadFile(topFiles[0]); 
    </script>
</body>
</html>
